version: 2

updates:
  - package-ecosystem: gomod
    directory: "/"
    schedule:
      interval: weekly
    commit-message:
      # Go modules are compiled into the shipped binary, so a dependency bump
      # changes the released artifact -> fix(deps): triggers a patch release.
      prefix: "fix"
      include: "scope"
    groups:
      go-deps:
        patterns:
          - "*"
        update-types:
          - minor
          - patch

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    commit-message:
      prefix: "chore"
      include: "scope"
    groups:
      actions:
        patterns:
          - "*"
        update-types:
          - minor
          - patch
