name: CI

# Pull-request and main-push checks: vet, build, and test on the same
# OS/arch matrix used by release.yml so PR signal matches release reality.
#
# Path filtering is applied at the JOB level rather than the trigger level
# so the `ci` aggregator job ALWAYS runs and reports a status. Branch
# protection requires only the `ci` check; on docs-only PRs the matrix is
# skipped and `ci` reports green.
#
# All third-party actions are pinned to commit SHAs with a trailing version
# comment for readability and Dependabot updates.

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  changes:
    name: detect changes
    runs-on: ubuntu-latest
    outputs:
      code: ${{ steps.filter.outputs.code }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Filter paths
        id: filter
        uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        with:
          filters: |
            code:
              - '!.github/dependabot.yml'
              - '!**/*.md'
              - '!docs/**'

  build-test:
    name: build & test ${{ matrix.os }}/${{ matrix.arch }}
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: linux
            arch: amd64
            runner: ubuntu-latest
          - os: linux
            arch: arm64
            runner: ubuntu-24.04-arm
          - os: darwin
            arch: arm64
            runner: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          check-latest: true

      - name: Vet
        run: go vet ./...

      - name: Build
        run: go build ./...

      - name: Test
        run: go test ./...

  # Single required-check wrapper. Branch protection should require ONLY this
  # job. `if: always()` lets it run even when build-test is skipped (e.g. a
  # docs-only PR). It fails only when an upstream job actually failed or was
  # cancelled; skipped upstream jobs are treated as success.
  ci:
    name: ci
    needs: [changes, build-test]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Aggregate upstream results
        env:
          NEEDS: ${{ toJSON(needs) }}
        run: |
          set -euo pipefail
          echo "needs context:"
          echo "${NEEDS}"
          if echo "${NEEDS}" | grep -qE '"result"[[:space:]]*:[[:space:]]*"(failure|cancelled)"'; then
            echo "::error::one or more required upstream jobs failed or were cancelled"
            exit 1
          fi
          echo "all upstream jobs passed or were skipped"
