name: CI

# Pull-request and main-push checks: vet, build, and test on the same
# OS/arch matrix used by release.yml so PR signal matches release reality.
#
# All third-party actions are pinned to commit SHAs with a trailing version
# comment for readability and Dependabot updates.

on:
  pull_request:
    paths-ignore:
      - ".github/dependabot.yml"
      - "*.md"
      - "docs/**"
  push:
    branches: [main]
    paths-ignore:
      - ".github/dependabot.yml"
      - "*.md"
      - "docs/**"

permissions:
  contents: read

jobs:
  build-test:
    name: build & test ${{ matrix.os }}/${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: linux
            arch: amd64
            runner: ubuntu-latest
          - os: linux
            arch: arm64
            runner: ubuntu-24.04-arm
          - os: darwin
            arch: arm64
            runner: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          check-latest: true

      - name: Vet
        run: go vet ./...

      - name: Build
        run: go build ./...

      - name: Test
        run: go test ./...
