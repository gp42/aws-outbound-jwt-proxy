name: Release

# Manual-only release workflow.
#   - Dispatched on `main`            → stable release (marked latest)
#   - Dispatched on any other branch  → prerelease tagged `vX.Y.Z-rc.N`
#
# All third-party actions are pinned to commit SHAs with a trailing version
# comment for readability and Dependabot updates.

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  version:
    name: compute version
    runs-on: ubuntu-latest
    # semantic-release (wrapped by huggingface/semver-release-action) does
    # `git push --dry-run` to probe push perms even when dryRun: true,
    # so the job needs contents:write — without it the action fails with
    # "Permission to <repo> denied to github-actions[bot]" / 403.
    permissions:
      contents: write
    outputs:
      version: ${{ steps.semver.outputs.tag }}
      is_prerelease: ${{ steps.kind.outputs.is_prerelease }}
      previous_tag: ${{ steps.prev.outputs.previous_tag }}
    steps:
      - name: Guard — must dispatch on a branch
        if: github.ref_type != 'branch'
        run: |
          echo "::error::release workflow must be dispatched on a branch ref (got ref_type=${{ github.ref_type }}, ref=${{ github.ref }})"
          exit 1

      - name: Determine release kind from branch
        id: kind
        run: |
          if [ "${{ github.ref_name }}" = "main" ]; then
            echo "is_prerelease=false" >> "$GITHUB_OUTPUT"
            echo "kind=stable" >> "$GITHUB_OUTPUT"
          else
            echo "is_prerelease=true" >> "$GITHUB_OUTPUT"
            echo "kind=prerelease (rc)" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout (full history + tags)
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Resolve previous tag (best effort)
        id: prev
        run: |
          prev="$(git describe --tags --abbrev=0 2>/dev/null || true)"
          echo "previous_tag=${prev}" >> "$GITHUB_OUTPUT"
          echo "previous tag: ${prev:-<none>}"

      - name: Build semantic-release branches config
        id: branches
        env:
          REF_NAME: ${{ github.ref_name }}
        run: |
          if [ "${REF_NAME}" = "main" ]; then
            cfg='[{"name":"main"}]'
          else
            # Synthesize a prerelease channel for the dispatched branch.
            cfg=$(printf '[{"name":"main"},{"name":"%s","prerelease":"rc"}]' "${REF_NAME}")
          fi
          echo "cfg=${cfg}" >> "$GITHUB_OUTPUT"
          echo "branches: ${cfg}"

      - name: Compute next semver (dry-run)
        id: semver
        uses: huggingface/semver-release-action@1a164868d29fb12acd39d70e8e47326db9d78ad2 # v1.1.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          dryRun: true
          branches: ${{ steps.branches.outputs.cfg }}

      - name: Fail if no version bump
        if: steps.semver.outputs.tag == ''
        run: |
          echo "::error::no Conventional Commits since last tag — nothing to release"
          exit 1

      - name: Summary
        run: |
          {
            echo "### Release plan"
            echo ""
            echo "| field | value |"
            echo "| --- | --- |"
            echo "| branch | \`${{ github.ref_name }}\` |"
            echo "| kind | ${{ steps.kind.outputs.kind }} |"
            echo "| previous tag | \`${{ steps.prev.outputs.previous_tag }}\` |"
            echo "| next version | \`${{ steps.semver.outputs.tag }}\` |"
          } >> "$GITHUB_STEP_SUMMARY"

  build:
    name: build ${{ matrix.os }}/${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}
    needs: version
    strategy:
      fail-fast: true
      matrix:
        include:
          - os: linux
            arch: amd64
            runner: ubuntu-latest
          - os: linux
            arch: arm64
            runner: ubuntu-24.04-arm
          - os: darwin
            arch: arm64
            runner: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          check-latest: true

      - name: Build
        env:
          GOOS: ${{ matrix.os }}
          GOARCH: ${{ matrix.arch }}
          CGO_ENABLED: "0"
          VERSION: ${{ needs.version.outputs.version }}
        run: |
          out="aws-outbound-jwt-proxy-${VERSION}-${GOOS}-${GOARCH}"
          go build \
            -trimpath \
            -ldflags "-s -w -X github.com/gp42/aws-outbound-jwt-proxy/internal/version.Version=${VERSION}" \
            -o "${out}" \
            .
          ls -la "${out}"

      - name: Upload binary artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: aws-outbound-jwt-proxy-${{ needs.version.outputs.version }}-${{ matrix.os }}-${{ matrix.arch }}
          path: aws-outbound-jwt-proxy-${{ needs.version.outputs.version }}-${{ matrix.os }}-${{ matrix.arch }}
          if-no-files-found: error
          retention-days: 7

  publish:
    name: publish release
    runs-on: ubuntu-latest
    needs:
      - version
      - build
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Download all build artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: artifacts
          merge-multiple: true

      - name: Stage release assets
        run: |
          mkdir -p release
          cp artifacts/aws-outbound-jwt-proxy-* release/
          cd release
          # Deterministic order for reproducible SHA256SUMS.
          ls aws-outbound-jwt-proxy-* | LC_ALL=C sort | xargs sha256sum > SHA256SUMS
          ls -la
          cat SHA256SUMS

      - name: Create and push annotated tag
        env:
          VERSION: ${{ needs.version.outputs.version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "${VERSION}" -m "${VERSION}" "${GITHUB_SHA}"
          git push origin "refs/tags/${VERSION}"

      - name: Compose release body
        id: body
        env:
          VERSION: ${{ needs.version.outputs.version }}
          PREV: ${{ needs.version.outputs.previous_tag }}
          REPO: ${{ github.repository }}
        run: |
          {
            echo "body<<EOF"
            if [ -n "${PREV}" ]; then
              echo "**Changes:** https://github.com/${REPO}/compare/${PREV}...${VERSION}"
            else
              echo "Initial release."
            fi
            echo ""
            echo "Built from \`${GITHUB_SHA}\` on branch \`${{ github.ref_name }}\`."
            echo ""
            echo "Verify downloads with the attached \`SHA256SUMS\` file:"
            echo ""
            echo '```sh'
            echo "sha256sum -c SHA256SUMS --ignore-missing"
            echo '```'
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          tag_name: ${{ needs.version.outputs.version }}
          name: ${{ needs.version.outputs.version }}
          body: ${{ steps.body.outputs.body }}
          prerelease: ${{ needs.version.outputs.is_prerelease == 'true' }}
          make_latest: ${{ needs.version.outputs.is_prerelease == 'false' && 'true' || 'false' }}
          files: |
            release/aws-outbound-jwt-proxy-*
            release/SHA256SUMS
          fail_on_unmatched_files: true

  docker:
    name: publish container image
    runs-on: ubuntu-latest
    needs:
      - version
      - build
      - publish
    if: vars.DOCKER_PUBLISH_ENABLED == 'true'
    permissions:
      contents: read
      packages: write
    env:
      IMAGE_DOCKERHUB: docker.io/gp42/aws-outbound-jwt-proxy
      IMAGE_GHCR: ghcr.io/gp42/aws-outbound-jwt-proxy
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Validate Docker Hub credentials present
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          if [ -z "${DOCKERHUB_USERNAME}" ] || [ -z "${DOCKERHUB_TOKEN}" ]; then
            echo "::error::DOCKERHUB_USERNAME / DOCKERHUB_TOKEN secrets are not set; cannot publish image"
            exit 1
          fi

      - name: Download linux/amd64 artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: aws-outbound-jwt-proxy-${{ needs.version.outputs.version }}-linux-amd64
          path: artifacts/linux-amd64

      - name: Download linux/arm64 artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: aws-outbound-jwt-proxy-${{ needs.version.outputs.version }}-linux-arm64
          path: artifacts/linux-arm64

      - name: Stage build context
        env:
          VERSION: ${{ needs.version.outputs.version }}
        run: |
          set -euo pipefail
          mkdir -p dist/linux/amd64 dist/linux/arm64
          cp "artifacts/linux-amd64/aws-outbound-jwt-proxy-${VERSION}-linux-amd64" dist/linux/amd64/aws-outbound-jwt-proxy
          cp "artifacts/linux-arm64/aws-outbound-jwt-proxy-${VERSION}-linux-arm64" dist/linux/arm64/aws-outbound-jwt-proxy
          chmod +x dist/linux/amd64/aws-outbound-jwt-proxy dist/linux/arm64/aws-outbound-jwt-proxy
          ls -la dist/linux/amd64 dist/linux/arm64

      - name: Verify binaries against the GitHub Release SHA256SUMS
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ needs.version.outputs.version }}
        run: |
          set -euo pipefail
          # Pull the SHA256SUMS the publish job just attached to the GitHub Release;
          # this is the canonical record of what the release ships.
          gh release download "${VERSION}" --pattern SHA256SUMS --dir release-sums --repo "${{ github.repository }}"
          # Verify our staged binaries against it. --ignore-missing lets us match the
          # two linux entries without needing the darwin binary present here.
          (
            cd release-sums
            ln -sf "../artifacts/linux-amd64/aws-outbound-jwt-proxy-${VERSION}-linux-amd64" .
            ln -sf "../artifacts/linux-arm64/aws-outbound-jwt-proxy-${VERSION}-linux-arm64" .
            sha256sum -c SHA256SUMS --ignore-missing
          )

      - name: Compute floating-tag fragments
        id: vfrag
        env:
          VERSION: ${{ needs.version.outputs.version }}
        run: |
          set -euo pipefail
          # VERSION looks like vX.Y.Z or vX.Y.Z-rc.N. We need the "vX" and "vX.Y"
          # forms only for stable releases (the metadata-action enable= flag
          # handles the gating; we just compute the strings unconditionally).
          base="${VERSION%%-*}"          # strip any -rc.N suffix → vX.Y.Z
          major="${base%%.*}"            # vX
          minor="${base%.*}"             # vX.Y
          echo "major=${major}" >> "$GITHUB_OUTPUT"
          echo "minor=${minor}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Log in to Docker Hub
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: docker.io
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Log in to GHCR
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image metadata
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6.0.0
        with:
          images: |
            ${{ env.IMAGE_DOCKERHUB }}
            ${{ env.IMAGE_GHCR }}
          # Tags are computed by hand because the workflow is dispatched (no
          # release/tag event) and we need to preserve the leading "v" that
          # the rest of the project uses for tag names.
          tags: |
            type=raw,value=${{ needs.version.outputs.version }}
            type=raw,value=${{ steps.vfrag.outputs.minor }},enable=${{ needs.version.outputs.is_prerelease == 'false' }}
            type=raw,value=${{ steps.vfrag.outputs.major }},enable=${{ needs.version.outputs.is_prerelease == 'false' }}
            type=raw,value=latest,enable=${{ needs.version.outputs.is_prerelease == 'false' }}
          flavor: |
            latest=false
          labels: |
            org.opencontainers.image.title=aws-outbound-jwt-proxy
            org.opencontainers.image.version=${{ needs.version.outputs.version }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.licenses=MIT

      - name: Build and push multi-arch image
        id: build
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          provenance: false
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Sync Docker Hub Overview from docs/docker.md
        # Docker Hub access tokens cannot edit the repository description —
        # the description API only accepts the account password. We use a
        # separate DOCKERHUB_PASSWORD secret here while DOCKERHUB_TOKEN (a
        # push-scoped PAT) is still used for image pushes above.
        if: needs.version.outputs.is_prerelease == 'false'
        uses: peter-evans/dockerhub-description@1b9a80c056b620d92cedb9d9b5a223409c68ddfa # v5.0.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}
          repository: gp42/aws-outbound-jwt-proxy
          short-description: AWS outbound identity federation — sign outbound HTTP requests with short-lived JWTs from AWS STS.
          readme-filepath: ./docs/docker.md

      - name: Summary
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
          TAGS: ${{ steps.meta.outputs.tags }}
        run: |
          {
            echo "### Container image"
            echo ""
            echo "| field | value |"
            echo "| --- | --- |"
            echo "| manifest digest | \`${DIGEST}\` |"
            echo ""
            echo "**Pushed tags:**"
            echo ""
            echo '```'
            echo "${TAGS}"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
